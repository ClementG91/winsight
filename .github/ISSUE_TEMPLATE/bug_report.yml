name: Bug report
description: Report a problem with a WinSight tool
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! For **security vulnerabilities**, do NOT use this form —
        see [SECURITY.md](../blob/main/SECURITY.md).
  - type: dropdown
    id: tool
    attributes:
      label: Tool
      description: Which part is affected?
      options:
        - persistence
        - camera/mic (av)
        - connections (net)
        - signature verification
        - CLI / reporting
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `winsight ...`
        2. ...
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "e.g. Windows 11 23H2 (build 22631)"
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste console output (use `--json` if helpful). Redact anything sensitive.
      render: shell
