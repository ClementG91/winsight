name: release

# Builds a self-contained winsight.exe and attaches it to a GitHub Release when a
# v* tag is pushed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore winsight.sln

      - name: Audit NuGet dependencies
        shell: pwsh
        run: ./scripts/Test-VulnerablePackages.ps1

      - name: Build and test tagged source
        run: |
          dotnet build winsight.sln -c Release --no-restore
          dotnet test winsight.sln -c Release --no-build --logger "console;verbosity=minimal"

      - name: Publish CLI and dashboard
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          dotnet publish src/WinSight.Cli/WinSight.Cli.csproj -c Release -r win-x64 --self-contained true -p:Version=$version -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/cli
          dotnet publish src/WinSight.Dashboard/WinSight.Dashboard.csproj -c Release -r win-x64 --self-contained true -p:Version=$version -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/dashboard
          $actualVersion = & ./publish/cli/winsight.exe --version
          if ($actualVersion -ne "winsight $version") { throw "Expected winsight $version, got $actualVersion" }
          & ./publish/dashboard/winsight-dashboard.exe --smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Dashboard smoke test failed with exit code $LASTEXITCODE" }

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item publish/cli/winsight.exe package/
          Copy-Item publish/dashboard/winsight-dashboard.exe package/
          Compress-Archive -Path package/* -DestinationPath winsight-${{ github.ref_name }}-win-x64.zip
          (Get-FileHash winsight-${{ github.ref_name }}-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant() + "  winsight-${{ github.ref_name }}-win-x64.zip" | Set-Content winsight-${{ github.ref_name }}-win-x64.zip.sha256 -Encoding ascii

      - name: Attest release archive provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: winsight-*-win-x64.zip

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            winsight-*-win-x64.zip
            winsight-*-win-x64.zip.sha256
          generate_release_notes: true
