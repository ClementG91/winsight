name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: windows-latest
            installer_language: french
          - architecture: arm64
            runner: windows-11-arm
            installer_language: spanish
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.301"
          architecture: ${{ matrix.architecture }}
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Validate tag version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          [xml]$props = Get-Content Directory.Build.props
          $projectVersion = $props.Project.PropertyGroup.Version
          if ($tagVersion -ne $projectVersion) {
            throw "Tag version $tagVersion does not match project version $projectVersion."
          }

      - name: Restore, build and test tagged source
        shell: pwsh
        run: |
          dotnet restore winsight.sln
          dotnet build winsight.sln -c Release --no-restore
          dotnet test winsight.sln -c Release --no-build --logger "trx;LogFilePrefix=release-${{ matrix.architecture }}"

      - name: Verify formatting and dependencies
        if: matrix.architecture == 'x64'
        shell: pwsh
        run: |
          dotnet format winsight.sln --verify-no-changes --no-restore
          ./scripts/Test-VulnerablePackages.ps1

      - name: Build release artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          ./scripts/Build-Release.ps1 -Version $version -Architectures ${{ matrix.architecture }}

      - name: Test native installer lifecycle
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          ./scripts/Test-Installer.ps1 `
            -InstallerPath "out/release/winsight-v$version-win-${{ matrix.architecture }}-setup.exe" `
            -Version $version `
            -Architecture ${{ matrix.architecture }} `
            -InstallerLanguage ${{ matrix.installer_language }}

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.architecture }}
          path: |
            out/release/*.zip
            out/release/*.exe
            out/release/*.json
            out/release/*.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Verify release checksums
        shell: pwsh
        run: |
          foreach ($checksumFile in Get-ChildItem release-assets -Filter *.sha256) {
            $parts = (Get-Content $checksumFile.FullName).Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)
            $artifact = Join-Path $checksumFile.DirectoryName $parts[1]
            $actual = (Get-FileHash $artifact -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne $parts[0]) { throw "Checksum mismatch for $artifact" }
          }

      - name: Attest release provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            release-assets/*.zip
            release-assets/*-setup.exe

      - name: Attest x64 SBOM
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        with:
          subject-path: release-assets/winsight-${{ github.ref_name }}-win-x64.zip
          sbom-path: release-assets/winsight-${{ github.ref_name }}-win-x64.spdx.json

      - name: Attest Arm64 SBOM
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        with:
          subject-path: release-assets/winsight-${{ github.ref_name }}-win-arm64.zip
          sbom-path: release-assets/winsight-${{ github.ref_name }}-win-arm64.spdx.json

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: release-assets/*
          generate_release_notes: true
