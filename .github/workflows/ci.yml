name: ci

# WinSight is net8.0-windows (Win32/registry/Authenticode), so CI runs on Windows.
# This is the compiler of record — the project is authored on Linux but built/tested
# here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Auto-discover every project/test project so new modules need no CI change.
      - name: Build all projects
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.csproj | ForEach-Object {
            Write-Host "::group::build $($_.Name)"
            dotnet build $_.FullName -c Release
            if ($LASTEXITCODE -ne 0) { $failed = $true }
            Write-Host "::endgroup::"
          }
          if ($failed) { exit 1 }

      - name: Test all test projects
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *Tests.csproj | ForEach-Object {
            Write-Host "::group::test $($_.Name)"
            dotnet test $_.FullName -c Release --logger "console;verbosity=minimal"
            if ($LASTEXITCODE -ne 0) { $failed = $true }
            Write-Host "::endgroup::"
          }
          if ($failed) { exit 1 }
