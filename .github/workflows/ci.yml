# Three jobs: `verify` does the work across a Windows matrix, `build-test` is the stable name branch
# protection requires, and `package` runs beside them.
#
# `package` used to declare `needs: build-test`, and the wall clock was 8m18 — 2m37 of build and
# test, then 5m38 of packaging that had been waiting for it. Nothing was being reused: the package
# job runs Build-Release.ps1, which publishes from source itself. The dependency only serialised two
# jobs that had no relationship. Run together, the same work lands in about 5m40, the length of the
# longest job.
#
# The trade is that a commit whose tests fail still gets packaged, spending runner minutes on an
# artifact nobody wants. Acceptable here: minutes are free on a public repository, superseded pushes
# are cancelled by the concurrency group, and nothing publishable escapes because release.yml builds
# and tests the tagged source itself before it will produce a release.
#
# Why formatting and the dependency audit live inside `verify` rather than becoming a job of their
# own: everything the required check must be able to fail on has to sit under it, or protection is
# quietly weakened while looking unchanged. Splitting them would also not shorten anything, because
# `package` still dominates the wall clock.
#
# Why `verify` is a matrix and `build-test` is a gate over it: a matrix leg reports as
# `verify (windows-2022)`, so requiring the matrix directly would mean re-listing every leg in
# branch protection, and again whenever the matrix changes. The gate keeps one name that outlives
# whatever runs behind it. Adding a Windows is then a one-line change here and nothing in settings.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Everything that decides whether the code is good, run on more than one Windows.
  #
  # Why a matrix at all: until the scanners were executed end to end, the suite could not tell
  # whether WinSight works anywhere but a developer's desk. It now runs all fifteen for real, and
  # that evidence is only worth what the machine underneath it is worth. `windows-latest` resolves
  # to Server 2025; `windows-2022` is a genuinely different build, with a different registry layout
  # and a different set of components present. A scanner that reads a key one of them does not have
  # fails here rather than at a user.
  #
  # fail-fast is off on purpose: when one Windows breaks, the interesting question is immediately
  # whether the other one did too, and cancelling the sibling throws that away.
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.301"
          architecture: x64
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Restore
        run: dotnet restore winsight.sln

      # Cheapest checks first: a formatting violation or a vulnerable package should not wait behind
      # a build and a full test run to be reported.
      - name: Verify formatting
        run: dotnet format winsight.sln --verify-no-changes --no-restore

      - name: Audit NuGet dependencies
        shell: pwsh
        run: ./scripts/Test-VulnerablePackages.ps1

      - name: Build
        run: dotnet build winsight.sln -c Release --no-restore

      # Runs the suite once, with coverage, and fails when an engine library drops below the bar the
      # project claims. Previously this was a plain `dotnet test` and Measure-Coverage.ps1 was never
      # invoked by any workflow, so engine coverage could regress to zero without a red build.
      # Folded into the existing test step rather than added beside it: running the suite twice
      # would double the job that dominates this workflow's wall clock.
      - name: Test and verify coverage
        shell: pwsh
        run: ./scripts/Measure-Coverage.ps1 -EngineMinimum 80 -TrxLogFilePrefix tests-x64

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # Matrix-scoped: two legs uploading one name collide and the second is rejected.
          name: test-results-${{ matrix.os }}
          path: |
            **/TestResults/*.trx
            out/coverage/**/*.trx
          if-no-files-found: ignore

  # The status-check name main's branch protection requires.
  #
  # It is a gate over `verify` rather than the job that does the work, and that indirection is the
  # whole point: a matrix leg is reported as `verify (windows-2022)`, so making `verify` itself
  # required would mean re-listing every leg in branch protection and re-listing them again the day
  # the matrix changes. One stable name outlives the matrix behind it.
  #
  # `needs.verify.result` is the aggregate: `success` only when every leg succeeded. `if: always()`
  # matters more than it looks — without it this job is *skipped* when a leg fails, and a skipped
  # required check does not read as a failed one. It would sit there neither passing nor failing.
  # Do not rename this job, and do not give it a `name:`; either changes the check name and silently
  # stops the protection rule matching anything.
  build-test:
    needs: verify
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every Windows to have passed
        run: |
          echo "verify: ${{ needs.verify.result }}"
          test "${{ needs.verify.result }}" = "success"

  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: windows-latest
            installer_language: french
          - architecture: arm64
            runner: windows-11-arm
            installer_language: spanish
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.301"
          architecture: ${{ matrix.architecture }}
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Build release candidate
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          ./scripts/Build-Release.ps1 -Version $version -Architectures ${{ matrix.architecture }}

      - name: Test native installer lifecycle
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          ./scripts/Test-Installer.ps1 `
            -InstallerPath "out/release/winsight-v$version-win-${{ matrix.architecture }}-setup.exe" `
            -Version $version `
            -Architecture ${{ matrix.architecture }} `
            -InstallerLanguage ${{ matrix.installer_language }}

      - name: Upload release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winsight-win-${{ matrix.architecture }}
          path: |
            out/release/*.zip
            out/release/*.exe
            out/release/*.json
            out/release/*.sha256
          if-no-files-found: error
