# Two jobs, deliberately independent.
#
# `package` used to declare `needs: build-test`, and the wall clock was 8m18 — 2m37 of build and
# test, then 5m38 of packaging that had been waiting for it. Nothing was being reused: the package
# job runs Build-Release.ps1, which publishes from source itself. The dependency only serialised two
# jobs that had no relationship. Run together, the same work lands in about 5m40, the length of the
# longest job.
#
# The trade is that a commit whose tests fail still gets packaged, spending runner minutes on an
# artifact nobody wants. Acceptable here: minutes are free on a public repository, superseded pushes
# are cancelled by the concurrency group, and nothing publishable escapes because release.yml builds
# and tests the tagged source itself before it will produce a release.
#
# Why formatting and the dependency audit stay inside build-test rather than becoming a third job:
# `build-test` is the required status check on main, so moving those steps out would leave the
# required check unable to fail on a formatting violation — protection quietly weakened while
# looking unchanged. Splitting them would also not shorten anything, because `package` dominates the
# wall clock either way. It is worth doing only alongside adding the new job to the branch's
# required checks, which is a repository settings change.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The job id is the status-check name main's branch protection requires. Do not rename it, and do
  # not give it a `name:` — that would change the check name and silently stop the rule matching.
  build-test:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.301"
          architecture: x64
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Restore
        run: dotnet restore winsight.sln

      # Cheapest checks first: a formatting violation or a vulnerable package should not wait behind
      # a build and a full test run to be reported.
      - name: Verify formatting
        run: dotnet format winsight.sln --verify-no-changes --no-restore

      - name: Audit NuGet dependencies
        shell: pwsh
        run: ./scripts/Test-VulnerablePackages.ps1

      - name: Build
        run: dotnet build winsight.sln -c Release --no-restore

      - name: Test
        run: dotnet test winsight.sln -c Release --no-build --logger "trx;LogFilePrefix=tests-x64"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-x64
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore

  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: windows-latest
            installer_language: french
          - architecture: arm64
            runner: windows-11-arm
            installer_language: spanish
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.301"
          architecture: ${{ matrix.architecture }}
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Build release candidate
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          ./scripts/Build-Release.ps1 -Version $version -Architectures ${{ matrix.architecture }}

      - name: Test native installer lifecycle
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          ./scripts/Test-Installer.ps1 `
            -InstallerPath "out/release/winsight-v$version-win-${{ matrix.architecture }}-setup.exe" `
            -Version $version `
            -Architecture ${{ matrix.architecture }} `
            -InstallerLanguage ${{ matrix.installer_language }}

      - name: Upload release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winsight-win-${{ matrix.architecture }}
          path: |
            out/release/*.zip
            out/release/*.exe
            out/release/*.json
            out/release/*.sha256
          if-no-files-found: error
